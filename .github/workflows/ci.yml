name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # Lightweight runtime subset needed to import src/ and run the unit
          # gates. The heavy GPU stack in requirements.txt is resolved on the
          # experiment runners; models/ and data/ are absent in CI by design,
          # and tests needing them skip.
          pip install numpy==2.4.6 'pyyaml==6.0.3' pydantic==2.13.4

      - name: black
        run: black --check src tests

      - name: isort
        run: isort --check-only --profile black src tests

      - name: flake8
        run: flake8 src tests

      - name: mypy
        run: mypy src

      - name: bandit
        run: bandit -r src -ll -ii

      - name: interrogate (docstring coverage)
        run: interrogate src

      - name: detect-secrets
        run: git ls-files | xargs detect-secrets-hook --baseline .secrets.baseline

      - name: radon (complexity report, informational)
        run: radon cc src -a -nc

      - name: pytest
        run: pytest tests/ -v --tb=short --cov=src --cov-fail-under=70

      - name: pip-audit (dependency CVEs)
        run: pip-audit
